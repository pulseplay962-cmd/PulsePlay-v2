<!doctype html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <meta
    name="theme-color"
    content="#070b14"
  />


  <!-- Favicon -->

  <link
    rel="icon"
    type="image/svg+xml"
    href="/pulseplay-logo.svg"
  />



  <!-- SEO -->

  <title>
    PulsePlay | Level Up Your Gaming Experience
  </title>


  <meta
    name="description"
    content="PulsePlay is a gaming community platform featuring live streams, gaming news, game discoveries, community content, and gamer gear."
  />


  <meta
    name="keywords"
    content="
      PulsePlay,
      gaming community,
      Twitch streams,
      gaming news,
      video games,
      PC gaming,
      console gaming,
      esports,
      gaming gear,
      game reviews
    "
  />


  <link
    rel="canonical"
    href="https://pulseplay.online"
  />




  <!-- Open Graph / Facebook / Discord -->

  <meta
    property="og:site_name"
    content="PulsePlay"
  />


  <meta
    property="og:title"
    content="PulsePlay | Level Up Your Gaming Experience"
  />


  <meta
    property="og:description"
    content="Watch streams, discover games, follow gaming news, and connect with the PulsePlay community."
  />


  <meta
    property="og:type"
    content="website"
  />


  <meta
    property="og:url"
    content="https://pulseplay.online"
  />


  <meta
    property="og:image"
    content="https://pulseplay.online/pulseplay-social.png"
  />




  <!-- Twitter / X -->

  <meta
    name="twitter:card"
    content="summary_large_image"
  />


  <meta
    name="twitter:title"
    content="PulsePlay | Level Up Your Gaming Experience"
  />


  <meta
    name="twitter:description"
    content="Gaming streams, news, community, and gamer gear built for players."
  />


  <meta
    name="twitter:image"
    content="https://pulseplay.online/pulseplay-social.png"
  />



</head>



<body>

  <div id="root"></div>


  <script
    type="module"
    src="/src/main.tsx"
  ></script>


</body>


</html>
